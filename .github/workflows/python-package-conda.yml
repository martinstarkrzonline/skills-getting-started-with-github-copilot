name: Python Package using Conda

on:
  push:
    branches:
      - main
      - development

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        python-version: ["3.8", "3.9", "3.10"]
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4.0.0
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Add conda to system path
      run: |
        # $CONDA is an environment variable pointing to the root of the miniconda directory
        echo $CONDA/bin >> $GITHUB_PATH
    - name: Cache conda packages
      uses: actions/cache@v3
      with:
        path: ~/.conda/envs
        key: conda-${{ runner.os }}-${{ hashFiles('**/environment.yml') }}
        restore-keys: conda
    - name: Install dependencies
      run: |
        conda env create -f environment.yml -n myenv
    - name: Lint with flake8
      run: |
        conda run -n myenv pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        conda run -n myenv flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        conda run -n myenv flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        conda run -n myenv pip install pytest
        conda run -n myenv pytest